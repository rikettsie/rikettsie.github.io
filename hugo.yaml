baseURL: https://rikettsie.github.io/
languageCode: en-us
title: Enrico's notes
theme: PaperMod
paginate: 10

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: Enrico Fusto
  description: "Enrico's hacks and works"
  keywords: [Blog, Portfolio]
  author: Enrico Fusto
  DateFormat: "January 2, 2006"
  defaultTheme: auto
  disableThemeToggle: false

  ShowReadingTime: false
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  hideFooter: true
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  assets:
    # disableHLJS: true # to disable highlight.js
    # disableFingerprinting: true

  socialIcons:
    - name: GitHub
      url: https://www.github.com/rikettsie
    - name: LinkedIn
      url: https://www.linkedin.com/in/enrico-fusto

  profileMode:
    enabled: true
    title: Enrico Fusto
    subtitle: curious learner, software engineer
    imageUrl: "/images/enrico.jpg"
    imageTitle: "me"
    imageWidth: 200 # custom size
    imageHeight: 200 # custom size
    buttons:
      - name: Posts
        url: /posts/
      - name: Tags
        url: /tags/

markup:
  goldmark:
    renderer:
      unsafe: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

menu:
  main:
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 10
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 20
    - identifier: search
      name: Search
      url: /search/
      weight: 30
